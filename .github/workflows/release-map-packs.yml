name: Release community map packs

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package map packs
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import zipfile

          root = pathlib.Path.cwd()
          dist = root / "dist"
          dist.mkdir(exist_ok=True)

          def sha256(path: pathlib.Path) -> str:
              h = hashlib.sha256()
              with path.open("rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def add_tree(zip_path: pathlib.Path, paths):
              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as zf:
                  for base in paths:
                      base = pathlib.Path(base)
                      if base.is_file():
                          zf.write(base, base.as_posix())
                          continue
                      for file_path in sorted(base.rglob("*")):
                          if file_path.is_file():
                              zf.write(file_path, file_path.as_posix())

          index = {
              "schema_version": 1,
              "repository": "modcsbr/community-maps",
              "commit": os.environ.get("GITHUB_SHA", "unknown"),
              "packs": []
          }

          for manifest_path in sorted((root / "maps").glob("*/manifest.json")):
              map_dir = manifest_path.parent
              manifest = json.loads(manifest_path.read_text(encoding="utf-8-sig"))
              map_id = manifest["id"]
              zip_path = dist / f"{map_id}.zip"
              add_tree(zip_path, [map_dir])
              index["packs"].append({
                  "id": map_id,
                  "title": manifest.get("title", map_id),
                  "asset": zip_path.name,
                  "sha256": sha256(zip_path),
                  "size_bytes": zip_path.stat().st_size,
                  "redistribution": manifest.get("redistribution"),
                  "source_status": manifest.get("source_status"),
                  "file_count": len(manifest.get("files", []))
              })

          full_zip = dist / "community-maps-full.zip"
          add_tree(full_zip, [root / "README.md", root / "schemas", root / "maps"])
          index["full_pack"] = {
              "asset": full_zip.name,
              "sha256": sha256(full_zip),
              "size_bytes": full_zip.stat().st_size
          }

          (dist / "manifest-index.json").write_text(json.dumps(index, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")

          with (dist / "checksums.sha256").open("w", encoding="utf-8") as f:
              for artifact in sorted(dist.glob("*.zip")):
                  f.write(f"{sha256(artifact)}  {artifact.name}\n")
              f.write(f"{sha256(dist / 'manifest-index.json')}  manifest-index.json\n")
          PY

      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: community-maps-${{ github.run_number }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          gh release create "$TAG_NAME" \
            dist/*.zip \
            dist/checksums.sha256 \
            dist/manifest-index.json \
            --title "Community map packs $TAG_NAME" \
            --notes "Automated community map pack release for commit ${GITHUB_SHA}."

